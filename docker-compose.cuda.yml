# NVIDIA layout GPU — builds Dockerfile.cuda (official pytorch/pytorch base).
#
#   docker compose -f docker-compose.yml -f docker-compose.cuda.yml up --build
#
# Requires NVIDIA drivers and NVIDIA Container Toolkit on the host.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.cuda
      target: runtime
      args:
        PYTORCH_CUDA_IMAGE: ${PYTORCH_CUDA_IMAGE:-pytorch/pytorch:2.9.1-cuda12.6-cudnn9-runtime}
    gpus: ${DOCKER_GPU_DEVICES:-all}
    environment:
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
